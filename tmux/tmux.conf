# ─────────────────────────────────────────────────────────────
# General
# ─────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on

# Prefix: keep C-b (change here if you prefer C-a)
# set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded ~/.config/tmux/tmux.conf"

# Splits in current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ─────────────────────────────────────────────────────────────
# Plugins (TPM)
# ─────────────────────────────────────────────────────────────
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "catppuccin/tmux#v2.3.0"

# ─────────────────────────────────────────────────────────────
# Catppuccin (Latte)
# ─────────────────────────────────────────────────────────────
set -g @catppuccin_flavor "latte"

# Window styling
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag, (),}"

# Status bar layout (must be set AFTER plugin load below)
run "~/.config/tmux/plugins/tpm/tpm"

set -g status-position top
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_host}"
set -agF status-right "#{E:@catppuccin_status_date_time}"
